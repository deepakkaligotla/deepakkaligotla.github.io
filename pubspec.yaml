name: deepakkaligotla
description: "A new Flutter project."
# The following line prevents the package from being accidentally published to
# pub.dev using `flutter pub publish`. This is preferred for private packages.
publish_to: 'none' # Remove this line if you wish to publish to pub.dev

# The following defines the version and build number for your application.
# A version number is three numbers separated by dots, like 1.2.43
# followed by an optional build number separated by a +.
# Both the version and the builder number may be overridden in flutter
# build by specifying --build-name and --build-number, respectively.
# In Android, build-name is used as versionName while build-number used as versionCode.
# Read more about Android versioning at https://developer.android.com/studio/publish/versioning
# In iOS, build-name is used as CFBundleShortVersionString while build-number is used as CFBundleVersion.
# Read more about iOS versioning at
# https://developer.apple.com/library/archive/documentation/General/Reference/InfoPlistKeyReference/Articles/CoreFoundationKeys.html
# In Windows, build-name is used as the major, minor, and patch parts
# of the product and file versions while build-number is used as the build suffix.
version: 1.0.0+1

environment:
  sdk: ^3.7.0

# Dependencies specify other packages that your package needs in order to work.
# To automatically upgrade your package dependencies to the latest versions
# consider running `flutter pub upgrade --major-versions`. Alternatively,
# dependencies can be manually updated by changing the version numbers below to
# the latest version available on pub.dev. To see which dependencies have newer
# versions available, run `flutter pub outdated`.
dependencies:
  flutter:
    sdk: flutter


  # -----------------------------
  # UI & Design Libraries
  # -----------------------------
  # The following adds the Cupertino Icons font to your application.
  # Use with the CupertinoIcons class for iOS style icons.
  cupertino_icons: ^1.0.8  # iOS style icons
  google_fonts: ^6.2.1  # Google Fonts for custom fonts
  flutter_svg: ^2.0.17  # SVG support for Flutter
  photo_view: ^0.15.0  # Display images with zoom and pan
  font_awesome_flutter: ^10.8.0  # Font Awesome icons
  flex_color_scheme: ^8.1.0  # Flexible color schemes for themes

  # -----------------------------
  # State Management
  # -----------------------------
  get: ^4.7.1  # State management and dependency injection
  riverpod_annotation: ^2.6.1  # Riverpod annotations for code generation
  hooks_riverpod: ^2.6.1  # Riverpod for state management with hooks
  flutter_hooks: ^0.20.5  # Hooks for better state management
  provider: ^6.1.2  # State management (basic Provider)

  # -----------------------------
  # Localization & Internationalization
  # -----------------------------
  easy_localization: ^3.0.7+1  # Easy localization for i18n
  intl: ^0.19.0  # Internationalization support (dates, numbers)

  # -----------------------------
  # Firebase & Google Cloud Platform (GCP)
  # -----------------------------
  firebase_core: ^3.11.0  # Core Firebase services

  # Firebase Authentication & User Management
  firebase_auth: ^5.4.2  # Firebase Authentication
  firebase_ui_auth: ^1.16.1  # Firebase UI Authentication
  firebase_ui_oauth_google: ^1.4.1  # Firebase OAuth with Google sign-in
  firebase_app_check: ^0.3.2+2  # Firebase App Check

  # Firebase Database & Firestore
  cloud_firestore: ^5.6.3  # Cloud Firestore (database)
  firebase_database: ^11.3.2  # Firebase Realtime Database

  # Firebase Cloud Functions & Messaging
  cloud_functions: ^5.3.2  # Firebase Cloud Functions
  firebase_messaging: ^15.2.2  # Firebase Cloud Messaging

  # Firebase Storage & Performance
  firebase_storage: ^12.4.2  # Firebase Storage for file storage
  firebase_performance: ^0.10.1+2  # Firebase Performance Monitoring

  # Firebase Remote Config & Data Sync
  firebase_remote_config: ^5.4.0  # Firebase Remote Config
  firebase_data_connect: ^0.1.3  # Firebase Data Connect (Real-time sync)
  firebase_app_installations: ^0.3.2+2  # Firebase App Installations

  # -----------------------------
  # Maps & Geolocation
  # -----------------------------
  google_maps_flutter: ^2.10.0  # Google Maps for Flutter
  google_maps_flutter_web: ^0.5.10  # Web support for Google Maps
  geocoding: ^3.0.0  # Geocoding (addresses from coordinates)

  # -----------------------------
  # Networking & API
  # -----------------------------
  url_launcher: ^6.3.1  # Launch URLs (web, email, etc.)
  device_info_plus: ^11.3.0  # Device info (platform, version, etc.)
  network_info_plus: ^6.1.3  # Network information (WiFi, IP, etc.)
  permission_handler: ^11.3.1 # Handle permissions (camera, location, etc.)
  file_picker: ^9.0.1  # File picker for file selection
  video_player: ^2.9.2  # Video player for media content
  platform: ^3.1.6  # Access platform-specific APIs (iOS, Android, etc.)

  # -----------------------------
  # Security & Storage
  # -----------------------------
  flutter_secure_storage: ^9.2.4  # Secure storage for sensitive data
  shared_preferences: ^2.5.2  # Simple key-value storage
  flutter_dotenv: ^5.2.1  # Load environment variables from .env files

  # -----------------------------
  # Logging & Debugging
  # -----------------------------
  easy_logger: ^0.0.2  # Simple logger for debugging

  # -----------------------------
  # Code Generation & Serialization
  # -----------------------------
  freezed_annotation: ^2.4.4  # Freezed for immutable data classes
  json_annotation: ^4.9.0  # JSON serialization support
  freezed: ^2.5.8  # Code generation for freezed data classes
  json_serializable: ^6.9.4  # JSON serialization code generation
  build_runner: ^2.4.15  # Code generation runner for Flutter

  # -----------------------------
  # Splash & Icon Management
  # -----------------------------
  flutter_native_splash: ^2.4.4  # Customize splash screen
  flutter_launcher_icons: ^0.14.3  # Set app launcher icons

  # -----------------------------
  # Miscellaneous
  # -----------------------------
  collection: ^1.19.0  # Utility functions for collections
  url_strategy: ^0.3.0  # Handle URL strategies for routing
  mockito: ^5.4.5  # Mocking framework for tests (Testing)
  material_symbols_icons: ^4.2805.1

  # -----------------------------
  # Testing Dependencies
  # -----------------------------
dev_dependencies:
  flutter_test:
    sdk: flutter

  # -----------------------------
  # Linting and Code Style
  # -----------------------------
  # The "flutter_lints" package below contains a set of recommended lints to
  # encourage good coding practices. The lint set provided by the package is
  # activated in the `analysis_options.yaml` file located at the root of your
  # package. See that file for information about deactivating specific lint
  # rules and activating additional ones.
  flutter_lints: ^5.0.0  # Flutter linting package
  custom_lint: ^0.7.3  # Custom lint rules for your project
  riverpod_lint: ^2.6.4  # Linting for Riverpod usage
  riverpod_generator: ^2.6.4  # Code generation for Riverpod

  # -----------------------------
  # Code Generation
  # -----------------------------
  freezed: ^2.5.8  # Code generation for freezed data classes
  json_serializable: ^6.9.4  # JSON serialization code generation
  build_runner: ^2.4.15  # Code generation runner for Flutter

  # -----------------------------
  # Splash & Icon Management
  # -----------------------------
  flutter_native_splash: ^2.4.4  # Customize splash screen
  flutter_launcher_icons: ^0.14.3  # Set app launcher icons

# For information on the generic Dart part of this file, see the
# following page: https://dart.dev/tools/pub/pubspec

# The following section is specific to Flutter packages.
flutter:

  # The following line ensures that the Material Icons font is
  # included with your application, so that you can use the icons in
  # the material Icons class.
  uses-material-design: true

  # To add assets to your application, add an assets section, like this:
assets:
  - assets/fonts
  - assets/icons
  - assets/images
  - assets/translations
  #   - images/a_dot_ham.jpeg

  # An image asset can refer to one or more resolution-specific "variants", see
  # https://flutter.dev/to/resolution-aware-images

  # For details regarding adding assets from package dependencies, see
  # https://flutter.dev/to/asset-from-package

  # To add custom fonts to your application, add a fonts section here,
  # in this "flutter" section. Each entry in this list should have a
  # "family" key with the font family name, and a "fonts" key with a
  # list giving the asset and other descriptors for the font. For
  # example:
fonts:
  - family: Schyler
    fonts:
      - asset: fonts/Schyler-Regular.ttf
      - asset: fonts/Schyler-Italic.ttf
        style: italic
  - family: Trajan Pro
    fonts:
      - asset: fonts/TrajanPro.ttf
      - asset: fonts/TrajanPro_Bold.ttf
        weight: 700
  # For details regarding fonts from package dependencies,
  # see https://flutter.dev/to/font-from-package

flutter_native_splash:
  color: "#60a3d9"
  image: "assets/images/spinner-light.apng"
  color_dark: "#122035"
  image_dark: "assets/images/spinner-dark.apng"

flutter_launcher_icons:
  android: "ic_launcher"
  ios: true
  remove_alpha_ios: true
  image_path: "assets/images/logo.png"
  min_sdk_android: 21
  web:
    generate: true
    image_path: "assets/images/logo.png"
  windows:
    generate: true
    image_path: "assets/images/logo.png"
    icon_size: 256
  macos:
    generate: true
    image_path: "assets/images/logo.png"